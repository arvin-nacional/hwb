<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heritage Without Borders 2026 – Hero (no scroll)</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* ----- RESET & BASE (same as working about section) ----- */
        .hero-embed * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .hero-embed {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.5;
            color: #1f2937;
            width: 100%;
            max-width: 100%;
            overflow-x: hidden;
            background: #651E1F; /* solid maroon background */
        }

        /* ----- COLOR VARIABLES (primary #651E1F) ----- */
        .hero-embed {
            --primary: #651E1F;
            --primary-light: #8b4b4c;
            --primary-foreground: #ffffff;
            --muted: #f3eee9;
            --muted-foreground: #5c4e4d;
            --border-muted: #dcd2cd;
        }

        /* ----- TYPOGRAPHY & UTILITIES ----- */
        .hero-embed .text-center { text-align: center; }
        .hero-embed .max-w-7xl { max-width: 80rem; }
        .hero-embed .mx-auto { margin-left: auto; margin-right: auto; }
        .hero-embed .font-serif { font-family: Georgia, 'Times New Roman', serif; }
        .hero-embed .font-bold { font-weight: 700; }
        .hero-embed .font-semibold { font-weight: 600; }
        .hero-embed .text-5xl { font-size: 3rem; line-height: 1; }
        .hero-embed .text-6xl { font-size: 3.75rem; line-height: 1; }
        .hero-embed .text-7xl { font-size: 4.5rem; line-height: 1; }
        .hero-embed .text-8xl { font-size: 6rem; line-height: 1; }
        .hero-embed .text-xl { font-size: 1.25rem; }
        .hero-embed .text-2xl { font-size: 1.5rem; }
        .hero-embed .text-sm { font-size: 0.875rem; }
        .hero-embed .text-white { color: #ffffff; }
        .hero-embed .text-white\/80 { color: rgba(255, 255, 255, 0.8); }
        .hero-embed .text-white\/90 { color: rgba(255, 255, 255, 0.9); }
        .hero-embed .bg-white { background-color: #ffffff; }

        /* spacing */
        .hero-embed .space-y-10 > * + * { margin-top: 2.5rem; }
        .hero-embed .space-y-8 > * + * { margin-top: 2rem; }
        .hero-embed .px-4 { padding-left: 1rem; padding-right: 1rem; }
        .hero-embed .py-16 { padding-top: 4rem; padding-bottom: 4rem; }
        .hero-embed .pt-4 { padding-top: 1rem; }
        .hero-embed .pt-8 { padding-top: 2rem; }
        .hero-embed .gap-4 { gap: 1rem; }
        .hero-embed .gap-6 { gap: 1.5rem; }
        .hero-embed .gap-12 { gap: 3rem; }

        @media (min-width: 768px) {
            .hero-embed .md\:py-32 { padding-top: 8rem; padding-bottom: 8rem; }
            .hero-embed .md\:px-8 { padding-left: 2rem; padding-right: 2rem; }
            .hero-embed .md\:text-6xl { font-size: 3.75rem; }
            .hero-embed .md\:text-2xl { font-size: 1.5rem; }
            .hero-embed .md\:col-span-3 { grid-column: span 3; }
            .hero-embed .md\:col-span-2 { grid-column: span 2; }
            .hero-embed .md\:grid-cols-5 { grid-template-columns: repeat(5, 1fr); }
            .hero-embed .md\:flex-row { flex-direction: row; }
            .hero-embed .md\:justify-end { justify-content: flex-end; }
        }
        @media (min-width: 1024px) {
            .hero-embed .lg\:text-7xl { font-size: 4.5rem; }
        }

        .hero-embed .grid { display: grid; }
        .hero-embed .flex { display: flex; }
        .hero-embed .flex-col { flex-direction: column; }
        .hero-embed .flex-row { flex-direction: row; }
        .hero-embed .flex-wrap { flex-wrap: wrap; }
        .hero-embed .items-center { align-items: center; }
        .hero-embed .justify-center { justify-content: center; }
        .hero-embed .flex-shrink-0 { flex-shrink: 0; }
        .hero-embed .relative { position: relative; }
        .hero-embed .w-full { width: 100%; }
        .hero-embed .max-w-sm { max-width: 24rem; }
        .hero-embed .max-w-md { max-width: 28rem; }
        .hero-embed .min-h-screen { min-height: 60vh; }
        .hero-embed .h-6 { height: 1.5rem; }
        .hero-embed .w-6 { width: 1.5rem; }
        .hero-embed .overflow-hidden { overflow: hidden; }
        .hero-embed .rounded-lg { border-radius: 0.5rem; }
        .hero-embed .shadow-2xl { box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); }
        .hero-embed .object-cover { object-fit: cover; }

        /* buttons */
        .hero-embed .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s ease;
            cursor: pointer;
            border: none;
            font-size: 1rem;
        }
        .hero-embed .btn-lg {
            padding: 1rem 2rem;
            font-size: 1.125rem;
        }
        .hero-embed .btn-primary {
            background-color: #ffffff;
            color: #651E1F;
        }
        .hero-embed .btn-primary:hover {
            background-color: rgba(255, 255, 255, 0.9);
        }
        .hero-embed .btn-secondary {
            background-color: transparent;
            color: #ffffff;
            border: 2px solid #ffffff;
        }
        .hero-embed .btn-secondary:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }
        .hero-embed .leading-tight { line-height: 1.25; }
        .hero-embed .leading-relaxed { line-height: 1.625; }
    </style>
</head>
<body style="margin:0; padding:0; background:#651E1F;">
    <!-- ========== EMBED THIS HERO SECTION (NO SCROLL) ========== -->
    <div class="hero-embed">
        <section class="px-4 py-16 md:px-8 min-h-screen flex items-center" style="background-color: #651E1F;">
            <div class="max-w-7xl mx-auto w-full">
                <div class="flex flex-col md:flex-row gap-12 items-center">
                    <!-- Left Column - Text (3/5 width) -->
                    <div class="md:col-span-3 space-y-10">
                        <div class="space-y-8">
                            <h1 class="text-5xl md:text-6xl lg:text-8xl font-serif font-bold text-white leading-tight">
                                Heritage Without Borders 2026
                            </h1>
                            <p class="text-xl md:text-2xl text-white/90 leading-relaxed">
                                A rare opportunity to elevate your art conservation practice to global standards with Kate Seymour, Chair of ICOM-CC.
                            </p>
                            <div class="flex flex-row max-sm:flex-col gap-4 pt-4">
                                <button class="btn btn-lg btn-primary" onclick="document.getElementById('pricing')?.scrollIntoView({ behavior: 'smooth' })">
                                    Register Now
                                </button>
                                <button class="btn btn-lg btn-secondary" onclick="document.getElementById('about')?.scrollIntoView({ behavior: 'smooth' })">
                                    Learn About Kate Seymour
                                </button>
                            </div>
                        </div>

                        <!-- Three feature items (responsive row) -->
                        <div class="flex flex-row flex-wrap gap-6 pt-8">
                            <div class="flex gap-4 items-center">
                                <i class="fas fa-calendar-alt w-6 h-6 text-white flex-shrink-0"></i>
                                <div>
                                    <h3 class="font-semibold text-white">April 20–25, 2026</h3>
                                    <p class="text-sm text-white/80">Philippines</p>
                                </div>
                            </div>
                            <div class="flex gap-4 items-center">
                                <i class="fas fa-calendar-week w-6 h-6 text-white flex-shrink-0"></i>
                                <div>
                                    <h3 class="font-semibold text-white">6-Day Program</h3>
                                    <p class="text-sm text-white/80">Conference, lectures & closing</p>
                                </div>
                            </div>
                            <div class="flex gap-4 items-center">
                                <i class="fas fa-map-marker-alt w-6 h-6 text-white flex-shrink-0"></i>
                                <div>
                                    <h3 class="font-semibold text-white">Multiple Venues</h3>
                                    <p class="text-sm text-white/80">QC MICE, National Library</p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Right Column - Image (2/5 width) -->
                    <!-- <div class="md:col-span-2 flex justify-center md:justify-end">
                        <img src="https://hebbkx1anhila5yf.public.blob.vercel-storage.com/photo-OcHzB8qcP9goC61qg0gQ86GMJKXssQ.png"
                            alt="Kate Seymour, Chair of ICOM-CC"
                            class="w-full max-w-sm md:max-w-md rounded-lg shadow-2xl object-cover"
                            style="max-width: 100%; height: auto;">
                    </div> -->
                </div>
            </div>
        </section>
    </div>
    <!-- ========== END EMBED ========== -->
</body>
</html>
