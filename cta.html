<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Heritage Without Borders 2026</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #651E1F;
            color: #ffffff;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }
        .cta-section {
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 4rem 2rem;
            box-sizing: border-box;
        }
        .cta-title {
            font-size: 3.5rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            line-height: 1.1;
        }
        .cta-subtitle {
            font-size: 1.5rem;
            margin-bottom: 3rem;
            opacity: 0.9;
            max-width: 700px;
        }
        .register-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 1.25rem 3rem;
            background-color: #ffffff;
            color: #651E1F;
            text-decoration: none;
            border-radius: 0.5rem;
            font-weight: 600;
            font-size: 1.25rem;
            transition: all 0.2s ease;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        .register-btn:hover {
            background-color: rgba(255, 255, 255, 0.95);
            transform: translateY(-3px);
            box-shadow: 0 8px 12px rgba(0, 0, 0, 0.15);
        }
        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }
            .cta-title {
                font-size: 2.5rem;
            }
            .cta-subtitle {
                font-size: 1.25rem;
            }
            .register-btn {
                padding: 1rem 2.5rem;
                font-size: 1.125rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <section id="cta-section" class="cta-section">
            <h1 class="cta-title">Ready to Join Us?</h1>
            <p class="cta-subtitle">
                Join Kate Seymour, Chair of ICOM-CC, for an exclusive art conservation experience in the Philippines.
            </p>
            
            <a href="https://docs.google.com/forms/d/e/1FAIpQLSdO44REglVVDze1fn1FEZuTbVipJwF8lM8UttCXjXmJNu7A6w/viewform" 
               target="_blank" 
               class="register-btn">
                Register Now
            </a>
        </section>
    </div>
</body>
</html>
